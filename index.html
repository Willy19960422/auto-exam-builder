    function shuffle(a) {
      const r = a.slice();
      for (let i = r.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const t = r[i]; r[i] = r[j]; r[j] = t;
      }
      return r;
    }
    const sample = (a, n) => shuffle(a).slice(0, n);

      function buildFromBank() {
        const { words, grammar } = scope;
        const sections = [];
        let no = 0;
        const notes = [];
        TYPES.forEach((t) => {
          const n = typeCounts[t.id];
          if (!n) return;

          if (t.id === "vocab_mc") {
            if (words.length < 2) { notes.push("單字選擇：課次單字不足"); return; }
            const items = sample(words, n).map((w) => {
              const askEn = Math.random() < 0.5;
              const others = sample(words.filter((x) => x.en !== w.en),
                Math.min(3, words.length - 1));
              let stem, correct, pool;
              if (askEn) {
                stem = "「" + w.en + "」的中文意思是？";
                correct = w.zh; pool = [w.zh, ...others.map((d) => d.zh)];
              } else {
                stem = "「" + w.zh + "」的英文是？";
                correct = w.en; pool = [w.en, ...others.map((d) => d.en)];
              }
              while (pool.length < 4) pool.push("—");
              const opts = shuffle(pool.slice(0, 4));
              return { no: ++no, stem, opts, ai: opts.indexOf(correct) };
            });
            sections.push({ name: "單字選擇", kind: "mc", items });
          }
          else if (t.id === "vocab_spell") {
            if (words.length < 1) { notes.push("單字填空：課次單字不足"); return; }
            const items = sample(words, n).map((w) => ({
              no: ++no,
              stem: "Spell the word ("
                + w.en.length + " letters): "
                + w.en[0] + " _".repeat(w.en.length - 1),
              answer: w.en,
            }));
            sections.push({ name: "單字填空 Spelling", kind: "spell", items });
          }
          else if (t.id === "grammar") {
            const exPool = [];
            grammar.forEach((gr) =>
              (gr.examples || []).forEach((ex) => exPool.push({ ...ex, point: gr.point })));
            const useFromBank = Math.min(n, exPool.length);
            const items = sample(exPool, useFromBank).map((ex) => {
              const correct = ex.c[ex.a];
              const opts = shuffle(ex.c);
              return { no: ++no, stem: ex.q, opts, ai: opts.indexOf(correct), tag: ex.point };
            });
            const shortBy = n - useFromBank;
            sections.push({ name: "文法選擇", kind: "mc", items, aiFill: shortBy });
            if (shortBy > 0) {
              notes.push(useFromBank === 0
                ? "文法選擇：課次無例句，將由 AI 生成 " + shortBy + " 題"
                : "文法選擇：例句僅 " + useFromBank + " 題，另由 AI 補 " + shortBy + " 題");
            }
          }
          else if (t.id === "translate") {
            if (words.length < 1) { notes.push("中譯英：課次單字不足"); return; }
            const items = sample(words, n).map((w) => ({
              no: ++no,
              stem: "請用「" + w.en + "（" + w.zh + "）」造一個英文句子。",
            }));
            sections.push({ name: "中譯英 / 造句", kind: "translate", items });
          }
          else if (t.id === "reading") {
            /* 內建題庫沒有閱讀短文資料，提示改用 AI 模式 */
            notes.push("閱讀測驗：內建題庫無短文資料，閱讀測驗請改用「AI 生成」模式");
          }
        });
        return { sections, total: no, notes };
      }

      async function aiFillGrammar(num, startNo) {
        const { grammar } = scope;
        const grammarList = [...new Set(grammar.map((gr) => gr.point))].join("、");
        const prompt = "你是台灣英語科出題老師。請為「" + stage + gradeLv +
          "」程度的學生，針對下列文法重點出 " + num + " 題文法選擇題：" +
          (grammarList || "（一般程度文法）") +
          "。每題必須是「具體的英文句子挖空」，不可只問抽象觀念。" +
          '嚴格只輸出 JSON：{"items":[{"stem":"含 ___ 的英文句子","opts":["A","B","C","D"],"ai":正解索引}]}';

        let data;
        try {
          data = await rawAI([{ role: "user", content: prompt }], 2000);
        } catch (e) {
          data = await rawAI([{ role: "user", content: prompt }], 2000);
        }
        let no = startNo;
        const items = (data.items || [])
          .filter((it) => it && it.stem && Array.isArray(it.opts))
          .map((it) => ({
            no: ++no, stem: it.stem, opts: it.opts,
            ai: typeof it.ai === "number" ? it.ai : 0, fromAI: true,
          }));
        if (items.length === 0) throw new Error("AI 未回傳可用題目");
        return items;
      }

      /* 共用的出題規則文字 */
      function aiRulesText() {
        return "\n【最重要的出題規則】\n" +
          "1. 單字選擇題：題幹必須是一個「完整的英文句子」，把要考的單字挖空成 ___，" +
          "四個選項全部是英文單字。絕對不可以出「某單字的中文意思是什麼」這種題目。\n" +
          "   範例：The weather is very ___ today, so we can play outside. (A) sunny (B) rainy (C) windy (D) cloudy\n" +
          "2. 單字填空題：給一段「英文釋義」(definition in English)，學生依釋義拼出單字。\n" +
          "   ★每一題都「必須」在釋義後面附上提示，格式固定為：\n" +
          "     釋義文字 + 首字母 + 空格底線（每個字母一個底線）+ (字數 letters)\n" +
          "   ★範例（每題都要長這樣，不可省略提示）：\n" +
          "     Definition: not cold; having a high temperature. h _ _ (3 letters)\n" +
          "     Definition: a person who teaches students. t _ _ _ _ _ _ (7 letters)\n" +
          "   ★釋義必須全英文。每一題考的單字都要不同，不可重複。\n" +
          "   ★stem 欄位請放「完整的釋義加提示」，answer 放正確單字。\n" +
          "3. 文法選擇題：題幹是完整英文句子挖空，選項全英文。\n" +
          "4. 中譯英題：給一個中文句子，學生翻成英文（這題型本來就含中文，屬正常）。\n" +
          "5. 除了中譯英題的中文句子之外，所有題幹和選項一律使用英文，不要出現中文。\n" +
          "6. 所有題目的單字與文法都必須落在指定的考試範圍內。\n";
      }

      /* 各題型各自的 JSON 格式說明 */
      function aiTypeFormat(typeId) {
        if (typeId === "vocab_mc")
          return '{"items":[{"stem":"含 ___ 的完整英文句子","opts":["英文A","英文B","英文C","英文D"],"ai":0}]}';
        if (typeId === "vocab_spell")
          return '{"items":[{"stem":"英文釋義加首字母提示","answer":"正確單字"}]}';
        if (typeId === "grammar")
          return '{"items":[{"stem":"含 ___ 的英文句子","opts":["A","B","C","D"],"ai":0}]}';
        return '{"items":[{"stem":"請翻譯成英文","zh":"中文句","answer":"英文翻譯"}]}';
      }

      /* 針對「單一題型、單一批次」呼叫 AI */
      async function aiOneBatch(typeId, typeName, count, rangeText) {
        const prompt = "你是台灣英語科出題老師。請依「" + stage + gradeLv + "」課程出題。\n" +
          rangeText +
          "本批請只出「" + typeName + "」這一種題型，共 " + count + " 題。\n" +
          aiRulesText() +
          "\n嚴格只輸出 JSON（不要任何其他文字）：\n" + aiTypeFormat(typeId) +
          "\n難度符合台灣" + gradeLv + "。";
        const data = await rawAI([{ role: "user", content: prompt }], 4000);
        return (data.items || []);
      }

      /* 閱讀測驗：每次產生「一篇短文 + 若干小題」 */
      async function aiReadingPassage(qNum, rangeText) {
        const prompt = "你是台灣英語科出題老師。請依「" + stage + gradeLv + "」程度，" +
          "出一篇英文閱讀測驗。\n" + rangeText +
          "請寫一篇適合該程度的英文短文，並針對短文出 " + qNum + " 道單選題。\n" +
          "短文與題目、選項全部用英文。題目要測閱讀理解，選項各 4 個。\n" +
          "\n嚴格只輸出 JSON（不要任何其他文字）：\n" +
          '{"passage":"英文短文內容","qs":[{"q":"英文問題","opts":["A","B","C","D"],"ai":0}]}';
        const data = await rawAI([{ role: "user", content: prompt }], 4000);
        return data;
      }

      async function buildFromAI() {
        const { words, grammar, lessonNames } = scope;
        const wordList = words.map((w) => w.en + "(" + w.zh + ")").join(", ");
        const grammarList = [...new Set(grammar.map((gr) => gr.point))].join("、");
        const rangeText =
          "【考試範圍】課次：" + (lessonNames.join("、") || "（未指定）") + "\n" +
          "範圍單字：" + (wordList || "（未提供）") + "\n" +
          "範圍文法：" + (grammarList || "（未提供）") + "\n";

        const chosen = TYPES.filter((t) => typeCounts[t.id] > 0);
        const BATCH = 12; /* 每批最多 12 題，安全不截斷 */
        const sections = [];
        const aiNotes = [];
        let no = 0;

        /* 逐題型處理，每題型內再分批 */
        for (let ti = 0; ti < chosen.length; ti++) {
          const t = chosen[ti];
          const want = typeCounts[t.id];

          /* 閱讀測驗：特殊處理，一篇短文一篇短文生 */
          if (t.id === "reading") {
            const QS_PER_PASSAGE = 4; /* 每篇短文出 4 小題 */
            const passages = [];
            let done = 0;
            while (done < want) {
              const thisQ = Math.min(QS_PER_PASSAGE, want - done);
              setLoadMsg("AI 出題中…閱讀測驗（" + (done + thisQ) + "/" + want + "）");
              const p = await aiReadingPassage(thisQ, rangeText);
              const qs = (p.qs || []).slice(0, thisQ).map((q) => ({
                no: ++no, q: q.q || "",
                opts: Array.isArray(q.opts) ? q.opts : [],
                ai: typeof q.ai === "number" ? q.ai : 0,
              }));
              passages.push({ passage: p.passage || "", qs: qs });
              done += thisQ;
            }
            sections.push({ name: t.name, kind: "reading", items: passages });
            continue;
          }

          let collected = [];
          for (let got = 0; got < want; got += BATCH) {
            const thisBatch = Math.min(BATCH, want - got);
            setLoadMsg("AI 出題中…" + t.name + "（" +
              Math.min(got + thisBatch, want) + "/" + want + "）");
            const items = await aiOneBatch(t.id, t.name, thisBatch, rangeText);
            collected = collected.concat(items);
          }

          /* 組成 section */
          if (t.id === "translate") {
            const arr = collected.slice(0, want).map((it) => ({
              no: ++no, stem: it.stem || "請翻譯成英文",
              zh: it.zh || "", answer: it.answer || "",
            }));
            sections.push({ name: t.name, kind: "translate", items: arr });
          } else if (t.id === "vocab_spell") {
            /* 去重複：同一個 answer 只留一題 */
            const seen = {};
            const uniq = [];
            collected.forEach((it) => {
              const ans = (it.answer || "").trim().toLowerCase();
              if (ans && !seen[ans]) { seen[ans] = true; uniq.push(it); }
            });
            const arr = uniq.slice(0, want).map((it) => {
              const ans = (it.answer || "").trim();
              let stem = (it.stem || "").trim();
              /* 保險：若 stem 沒有附「底線提示」，程式自動補上 */
              const hasHint = stem.indexOf("_") !== -1 || /\(\d+ letters?\)/.test(stem);
              if (ans && !hasHint) {
                const hint = ans[0] + " _".repeat(Math.max(0, ans.length - 1))
                  + " (" + ans.length + " letters)";
                /* 去掉 stem 結尾可能殘留的 Answer: 字樣 */
                stem = stem.replace(/answer\s*[:：]?\s*$/i, "").trim();
                stem = stem + "  " + hint;
              }
              return { no: ++no, stem: stem, answer: ans };
            });
            sections.push({ name: t.name, kind: "spell", items: arr });
            if (arr.length < want) {
              aiNotes.push("單字填空：AI 出現重複，去重後為 " + arr.length + " 題");
            }
          } else {
            const arr = collected.slice(0, want)
              .filter((it) => it && it.stem && Array.isArray(it.opts))

                ai: typeof it.ai === "number" ? it.ai : 0,
              }));
            sections.push({ name: t.name, kind: "mc", items: arr });
          }
        }

        return { sections: sections, total: no, notes: aiNotes };
      }

      /* ---------- 整合 GAS 中繼站的 API 呼叫（v8 強化版） ---------- */
      async function rawAI(messages, maxTokens) {
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzad-xu7pVgFhtQSJJH40VKWJ4wMd2tfrST4zv9dnp4fTgLax9tnFfg6X3frPFuwfyP/exec";

        let res;
        try {
          res = await fetch(GAS_WEB_APP_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: maxTokens || 4000,
              messages,
            }),
          });
        } catch (e) {
          throw new Error("無法連線到 GAS 中繼站（" + e.message + "）。請確認網址正確、GAS 已部署為「任何人皆可存取」，並檢查網路。");
        }

        if (!res.ok) {
          let detail = "";
          try { detail = (await res.text()).slice(0, 300); } catch (e2) {}
          throw new Error("中繼站回應 HTTP " + res.status + "。" + detail);
        }

        let raw;
        try {
          raw = await res.text();
        } catch (e3) {
          throw new Error("無法讀取中繼站回應內容。");
        }
        if (raw.trim().startsWith("<")) {
          throw new Error("中繼站回傳的是網頁而非資料，通常代表 GAS 部署權限不是「任何人」，或網址錯誤。");
        }

        let data;
        try {
          data = JSON.parse(raw);
        } catch (e4) {
          throw new Error("中繼站回應不是有效 JSON。前 120 字：" + raw.slice(0, 120));
        }

        if (data.error) {
          const m = (data.error && data.error.message) ? data.error.message : JSON.stringify(data.error);
          throw new Error("AI 服務錯誤：" + m);
        }
        if (data.type === "error") {
          throw new Error("AI 服務錯誤：" + JSON.stringify(data));
        }

        /* 取出 AI 回覆文字：相容多種可能的回傳結構 */
        let text = "";
        if (Array.isArray(data.content)) {
          text = data.content.map(function (i) {
            return i && i.type === "text" ? i.text : "";
          }).join("");
        } else if (typeof data.content === "string") {
          text = data.content;
        } else if (typeof data.text === "string") {
          text = data.text;
        } else if (typeof data.completion === "string") {
          text = data.completion;
        } else {
          throw new Error("無法從中繼站回應取出 AI 內容。回應鍵：" + Object.keys(data).join(","));
        }

        text = text.replace(/```json|```/g, "").trim();
        if (!text) throw new Error("AI 回傳內容為空。");

        if (!text.startsWith("{")) {
          const s = text.indexOf("{");
          if (s !== -1) text = text.slice(s);
        }

        /* 嘗試解析；若失敗，可能是 JSON 被截斷，試著修復 */
        function tryParse(str) {
          try { return JSON.parse(str); } catch (err) { return null; }
        }

        let parsed = tryParse(text);

        /* 修復一：截到最後一個完整的 } 為止 */
        if (!parsed) {
          const lastBrace = text.lastIndexOf("}");
          if (lastBrace !== -1) {
            parsed = tryParse(text.slice(0, lastBrace + 1));
          }
        }

        /* 修復二：JSON 被截斷時，自動補上缺少的結尾括號 */
        if (!parsed) {
          let fixed = text;
          /* 去掉結尾不完整的片段（最後一個逗號之後的殘字） */
          const lastComma = fixed.lastIndexOf(",");
          const lastClose = Math.max(fixed.lastIndexOf("}"), fixed.lastIndexOf("]"));
          if (lastComma > lastClose) fixed = fixed.slice(0, lastComma);
          /* 數一數還缺幾個 ] 和 } */
          let openCurly = 0, openSquare = 0;
          for (let i = 0; i < fixed.length; i++) {
            const ch = fixed[i];
            if (ch === "{") openCurly++;
            else if (ch === "}") openCurly--;
            else if (ch === "[") openSquare++;
            else if (ch === "]") openSquare--;
          }
          while (openSquare-- > 0) fixed += "]";
          while (openCurly-- > 0) fixed += "}";
          parsed = tryParse(fixed);
        }

        if (parsed) return parsed;

        throw new Error("AI 回傳內容無法解析（可能題目太長被截斷）。請減少題數後再試。前 80 字：" + text.slice(0, 80));
      }

      function wrapSections(parsed) {
        let no = 0;
        (parsed.sections || []).forEach((s) =>
          (s.items || []).forEach((it) => (it.no = ++no)));
        return { sections: parsed.sections, total: no, notes: [] };
      }

      async function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        setUploadName(file.name); setError("");
        const lower = file.name.toLowerCase();
        const isPdf = file.type === "application/pdf" || lower.endsWith(".pdf");
        const isImg = file.type.startsWith("image/");
        const isWord = lower.endsWith(".docx") || lower.endsWith(".doc");

        if (isWord) {
          try {
            const buf = await file.arrayBuffer();
            const r = await window.mammoth.extractRawText({ arrayBuffer: buf });
            const txt = (r.value || "").trim();
            if (!txt) { setError("無法從 Word 讀到文字，請改用 PDF 或截圖。"); setUploadData(null); return; }
            setUploadData({ kind: "text", text: txt });
          } catch (err) { setError("Word 解析失敗，請改存 PDF 或截圖。"); setUploadData(null); }
          return;
        }
        if (isPdf) {
          const r = new FileReader();
          r.onload = () => setUploadData({ kind: "pdf", base64: r.result.split(",")[1] });
          r.readAsDataURL(file); return;
        }
        if (isImg) {
          const r = new FileReader();
          r.onload = () => setUploadData({
            kind: "image", mediaType: file.type || "image/png", base64: r.result.split(",")[1] });
          r.readAsDataURL(file); return;
        }
        setError("不支援的格式，請上傳 PDF、Word 或圖片。"); setUploadData(null);
      }

          } catch (e) {
            if (e.message === "empty-past") {
              setError("考古題題庫目前為空。請先匯入真實考古題，或改用「AI 模擬卷」。");
            } else {
              setError("模擬卷生成失敗：" + e.message);
            }
          } finally { setLoading(false); setLoadMsg(""); }
          return;
        }

        const chosen = TYPES.filter((t) => typeCounts[t.id] > 0);
        if (chosen.length === 0) { setError("請至少為一種題型設定題數。"); return; }
        const titleFinal = title || (stage + gradeLv + "英文科 隨堂測驗");

        if (mode === "upload") {
          if (!uploadData) { setError("請先上傳一份考卷檔案。"); return; }
          setLoading(true); setLoadMsg("分析上傳考卷並仿題中…");
          try {

            setExam({ ...built, title: titleFinal, scopeNames: ["仿照上傳考卷：" + uploadName] });
          } catch (e) { setError("考卷分析失敗：" + e.message); }
          finally { setLoading(false); setLoadMsg(""); }
          return;
        }

        if (pickedLessons.size === 0) { setError("請至少勾選一個課次作為考試範圍。"); return; }

        if (mode === "bank") {

            setLoading(true);
            setLoadMsg("課次例句不足，AI 補出 " + gSec.aiFill + " 題文法題中…");
            try {
              const extra = await aiFillGrammar(gSec.aiFill, built.total);
              gSec.items = [...gSec.items, ...extra];
              built.total += extra.length;
            } catch (e) {
              built.notes.push("AI 補文法題失敗（" + e.message + "）。文法題僅含課次例句 " + gSec.items.length + " 題。");
            } finally { setLoading(false); setLoadMsg(""); }
          }
          if (built.total === 0) {
            setError("所選範圍無法出題，請多選課次或改用 AI 模式。");
            return;
          }
          setExam({ ...built, title: titleFinal, scopeNames: scope.lessonNames });
        } else {
          setLoading(true); setLoadMsg("AI 依課次範圍出題中…");
          try {
            const built = await buildFromAI();
            setExam({ ...built, title: titleFinal, scopeNames: scope.lessonNames });
          } catch (e) { setError("AI 出題失敗：" + e.message + "　可改用內建題庫模式。"); }
          finally { setLoading(false); setLoadMsg(""); }
        }
      }

                          onClick={() => setCount(t.id, (typeCounts[t.id] || 0) - 1)}>－</button>
                        <input type="number" min="0" max="40" value={typeCounts[t.id]}
                          onChange={(e) => setCount(t.id, +e.target.value || 0)}
                          style={S.stepInput} />
                        <button style={S.stepBtn}
                          onClick={() => setCount(t.id, (typeCounts[t.id] || 0) + 1)}>＋</button>
                        <span style={S.stepUnit}>題</span>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={S.totalLine}>合計 {totalQ} 題</div>
              </Section>
            )}

            <Section num="" title="考卷標題（選填）">
              <input type="text" value={title} placeholder="例：第一次段考 英文科"
                onChange={(e) => setTitle(e.target.value)} style={{ ...S.input, width: 320 }} />
            </Section>

            <div style={S.actions}>
              <button style={S.goBtn} onClick={handleGenerate} disabled={loading}>
                {loading ? (loadMsg || "處理中…") : "產生考卷"}
              </button>
              <label style={S.checkbox}>
                <input type="checkbox" checked={showKey}
                  onChange={(e) => setShowKey(e.target.checked)} />　附上解答
              </label>
            </div>
            {error && <p style={S.error}>{error}</p>}
          </div>

          {exam && (
            <div style={S.card}>
              <div style={S.toolbar} className="no-print">
                <button style={S.toolBtn} onClick={() => window.print()}>列印 / 存 PDF</button>
                <button style={S.toolBtn} onClick={exportWord}>匯出 Word</button>
                <button style={S.toolBtnGhost} onClick={handleGenerate}>重新出題</button>
              </div>
              {exam.notes && exam.notes.length > 0 && (
                <p style={S.warn} className="no-print">※ {exam.notes.join("；")}</p>
              )}
              <ExamView exam={exam} showKey={showKey} />
            </div>
          )}
        </div>
      );
    }

    function ExamView({ exam, showKey }) {
      const keyRows = [];
      return (
        <div id="exam-print" style={S.examWrap}>
          <h2 style={S.examTitle}>{exam.title}</h2>
          {exam.scopeNames && exam.scopeNames.length > 0 && (
            <div style={S.scopeTag}>{exam.scopeNames.join("、")}</div>
          )}
          <div style={S.examMeta}>
            <span>班級：________</span><span>座號：______</span>
            <span>姓名：________</span><span>分數：______</span>
          </div>
          <hr style={S.hr} />

          {(exam.sections || []).map((sec, si) => {
            const label = (["一", "二", "三", "四", "五", "六"][si] || (si + 1)) + "、" + sec.name;

            if (sec.kind === "reading") {
              const flat = [];
              (sec.items || []).forEach((p) => (p.qs || []).forEach((q) => flat.push(q)));
              keyRows.push({ label, rows: flat.map((q) => q.no + ". " + (LETTERS[q.ai] || "")) });
              return (
                <div key={si}>
                  <div className="sec" style={S.secTitle}>{label}（共 {flat.length} 題）</div>
                  {(sec.items || []).map((p, pi) => (
                    <div key={pi} style={{ marginBottom: 14 }}>
                      <div style={S.passage}>{p.passage}</div>
                      {(p.qs || []).map((q) => (
                        <div key={q.no} className="q" style={S.q}>
                          <div><b style={S.qno}>{q.no}.</b> {q.q}</div>
                          <div className="ch" style={S.choices}>
                            {q.opts.map((o, i) => <span key={i}>{LETTERS[i]} {o}</span>)}
                          </div>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              );
            }
            if (sec.kind === "mc") {
              keyRows.push({ label, rows: sec.items.map((it) => it.no + ". " + (LETTERS[it.ai] || "")) });
              return (
                <div key={si}>
                  <div className="sec" style={S.secTitle}>{label}（共 {sec.items.length} 題）</div>
                  {sec.items.map((it) => (
                    <div key={it.no} className="q" style={S.q}>
                      <div><b style={S.qno}>{it.no}.</b> {it.stem.replace("___", "＿＿＿＿")}</div>
                      <div className="ch" style={S.choices}>
                        {it.opts.map((o, i) => <span key={i}>{LETTERS[i]} {o}</span>)}
                      </div>
                    </div>
                  ))}
                </div>
              );
            }
            if (sec.kind === "spell") {
              keyRows.push({ label, rows: sec.items.map((it) => it.no + ". " + it.answer) });
              return (
                <div key={si}>
                  <div className="sec" style={S.secTitle}>{label}（共 {sec.items.length} 題）</div>
                  {sec.items.map((it) => (
                    <div key={it.no} className="q" style={S.q}>
                      <b style={S.qno}>{it.no}.</b> {it.stem}
                    </div>
                  ))}
                </div>
              );
            }
            keyRows.push({
              label, rows: sec.items.map((it) => it.no + ". " + (it.answer || "（參考老師範例）")),
            });
            return (
              <div key={si}>
                <div className="sec" style={S.secTitle}>{label}（共 {sec.items.length} 題）</div>
                {sec.items.map((it) => (
                  <div key={it.no} className="q" style={S.q}>
                    <div><b style={S.qno}>{it.no}.</b> {it.stem}</div>
                    {it.zh && <div style={{ marginTop: 2 }}>{it.zh}</div>}
                    <div style={S.answerLine}>➜ ______________________________________</div>
                  </div>
                ))}
              </div>
            );
          })}

          {showKey && (
            <div style={S.keyBox}>
              <div style={S.keyTitle}>◆ 解答 Answer Key</div>
              {keyRows.map((kr, i) => (
                <div key={i} style={{ marginBottom: 6 }}>
                  <b>{kr.label}</b>
                  <div style={S.keyRow}>{kr.rows.join("　")}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function Section({ num, title, children }) {
      return (
        <div style={{ marginBottom: 22 }}>
          <div style={S.secHead}>
            {num !== "" && <span style={S.secNum}>{num}</span>}
            <span>{title}</span>
          </div>
          {children}
        </div>
      );
    }
    function Pill({ active, onClick, children, small }) {
      return (
        <button onClick={onClick}
          style={{ ...S.pill, ...(small ? S.pillSmall : {}), ...(active ? S.pillOn : {}) }}>
          {children}
        </button>
      );
    }
    function ModeBtn({ active, onClick, title, desc }) {
      return (
        <div onClick={onClick} style={{ ...S.modeBtn, ...(active ? S.modeBtnOn : {}) }}>
          <b>{title}</b>
          <span style={{ display: "block", fontSize: 12, marginTop: 2, opacity: 0.8 }}>{desc}</span>
        </div>
      );
    }

    const C = {
      ink: "#1c2b27", paper: "#f4f1e8", card: "#fffdf6",
      accent: "#0f5c3e", accentSoft: "#dfe9e2", gold: "#b58a2e", line: "#cfc9b4",
    };
    const S = {
      page: { minHeight: "100vh", background: C.paper, padding: "28px 16px 70px",
        fontFamily: "'Noto Serif TC','Songti TC',serif", color: C.ink },
      header: { maxWidth: 880, margin: "0 auto", textAlign: "center",
        border: "2px solid " + C.ink, background: C.card, padding: "26px 18px",
        boxShadow: "7px 7px 0 " + C.ink },
      kicker: { fontSize: 11, letterSpacing: 2, color: C.gold, fontStyle: "italic" },
      h1: { fontSize: 30, fontWeight: 900, letterSpacing: 3, margin: "6px 0 4px" },
      sub: { fontSize: 14, color: "#5a6660" },
      demoBar: { maxWidth: 880, margin: "14px auto 0", background: "#fbf1d8",
        border: "1.6px solid " + C.gold, padding: "10px 14px", fontSize: 12.5,
        lineHeight: 1.7, color: "#6b5417" },
      card: { maxWidth: 880, margin: "16px auto 0", background: C.card,
        border: "2px solid " + C.ink, boxShadow: "5px 5px 0 rgba(28,43,39,.14)",
        padding: "24px 24px 26px" },
      secHead: { display: "flex", alignItems: "center", gap: 9, fontWeight: 700,
        fontSize: 15, letterSpacing: 1, borderBottom: "2px solid " + C.ink,
        paddingBottom: 6, marginBottom: 13 },
      secNum: { background: C.accent, color: "#fff", minWidth: 24, height: 24,
        padding: "0 5px", display: "inline-flex", alignItems: "center",
        justifyContent: "center", fontSize: 13, borderRadius: 2 },
      row: { display: "flex", gap: 9, flexWrap: "wrap" },
      modeRow: { display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(150px,1fr))", gap: 9 },
      pill: { border: "1.6px solid " + C.ink, background: C.paper, padding: "9px 22px",
        cursor: "pointer", fontSize: 14, fontFamily: "inherit", color: C.ink },
      pillSmall: { padding: "7px 16px", fontSize: 13 },
      pillOn: { background: C.accent, color: "#fff", boxShadow: "3px 3px 0 " + C.gold },
      modeBtn: { flex: 1, minWidth: 150, border: "1.6px solid " + C.ink,
        background: C.paper, padding: "13px 16px", cursor: "pointer" },
      modeBtnOn: { background: C.accent, color: "#fff", boxShadow: "3px 3px 0 " + C.gold },
      mockNote: { marginTop: 9, fontSize: 13, color: "#5a6660",
        background: C.accentSoft, padding: "9px 12px", lineHeight: 1.7 },
      uploadBox: { display: "block", border: "2px dashed " + C.ink, background: C.paper,
        padding: "22px 16px", textAlign: "center", cursor: "pointer", fontSize: 14 },
      scopeHint: { fontSize: 13, color: "#5a6660", marginBottom: 11, lineHeight: 1.7 },
      versionBlock: { marginBottom: 12 },
      versionTag: { fontWeight: 700, fontSize: 13.5, color: C.gold,
        borderBottom: "1.4px solid " + C.line, paddingBottom: 3, marginBottom: 8 },
      bookBlock: { marginBottom: 12, border: "1.4px solid " + C.line, padding: "10px 12px" },
      bookHead: { fontWeight: 700, fontSize: 14, marginBottom: 8, color: C.accent },
      lessonRow: { display: "flex", gap: 8, flexWrap: "wrap" },
      lesson: { border: "1.5px solid " + C.ink, background: C.paper,
        padding: "8px 13px", cursor: "pointer", minWidth: 110 },
      lessonOn: { background: C.accent, color: "#fff", boxShadow: "3px 3px 0 " + C.gold },
      lessonTheme: { display: "block", fontSize: 11.5, opacity: 0.85, marginTop: 2 },
      scopeSummary: { marginTop: 6, fontSize: 13, color: C.accent,
        background: C.accentSoft, padding: "8px 11px", lineHeight: 1.7 },
      typeList: { display: "flex", flexDirection: "column", gap: 9 },
      typeRow: { display: "flex", alignItems: "center", justifyContent: "space-between",
        border: "1.5px solid " + C.ink, background: C.paper, padding: "10px 14px", gap: 12 },
      typeInfo: { display: "flex", flexDirection: "column" },
      typeDesc: { fontSize: 12, fontStyle: "italic", opacity: 0.8, marginTop: 1 },
      stepper: { display: "flex", alignItems: "center", gap: 4 },
      stepBtn: { width: 30, height: 30, border: "1.6px solid " + C.ink,
        background: C.card, cursor: "pointer", fontSize: 16, fontFamily: "inherit",
        lineHeight: 1, color: C.ink },
      stepInput: { width: 52, height: 30, textAlign: "center", fontFamily: "inherit",
        fontSize: 15, border: "1.6px solid " + C.ink, background: C.card, color: C.ink },
      stepUnit: { fontSize: 13, marginLeft: 2 },
      totalLine: { marginTop: 10, textAlign: "right", fontWeight: 700, fontSize: 14, color: C.accent },
      input: { fontFamily: "inherit", fontSize: 15, padding: "9px 11px",
        border: "1.6px solid " + C.ink, background: C.paper, color: C.ink },
      hint: { fontSize: 12, color: "#7d857f", fontStyle: "italic" },
      actions: { display: "flex", alignItems: "center", gap: 18, marginTop: 6, flexWrap: "wrap" },
      goBtn: { fontFamily: "inherit", fontWeight: 700, fontSize: 16, letterSpacing: 2,
        color: "#fff", background: C.ink, border: "2px solid " + C.ink,
        padding: "13px 32px", cursor: "pointer", boxShadow: "5px 5px 0 " + C.gold },
      checkbox: { fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center" },
      error: { color: "#a3402c", fontSize: 13, marginTop: 10, lineHeight: 1.7 },
      warn: { color: "#a3402c", fontSize: 13, marginBottom: 12 },
      toolbar: { display: "flex", gap: 11, marginBottom: 16, flexWrap: "wrap" },
      toolBtn: { fontFamily: "inherit", fontWeight: 700, fontSize: 14, color: "#fff",
        background: C.ink, border: "2px solid " + C.ink, padding: "10px 20px",
        cursor: "pointer", boxShadow: "4px 4px 0 " + C.gold },
      toolBtnGhost: { fontFamily: "inherit", fontSize: 14, background: "transparent",
        border: "1.6px solid " + C.ink, padding: "10px 18px", cursor: "pointer", color: C.ink },
      examWrap: { fontSize: 15, lineHeight: 1.9 },
      examTitle: { textAlign: "center", fontSize: 22, fontWeight: 900, margin: 0 },
      scopeTag: { textAlign: "center", fontSize: 13, color: C.accent, marginTop: 4 },
      examMeta: { display: "flex", justifyContent: "space-between", fontSize: 13,
        marginTop: 12, flexWrap: "wrap", gap: 6 },
      hr: { border: "none", borderTop: "2.5px double " + C.ink, margin: "10px 0 4px" },
      secTitle: { fontWeight: 700, letterSpacing: 1, margin: "20px 0 6px",
        background: C.accentSoft, borderLeft: "5px solid " + C.accent, padding: "6px 11px" },
      q: { margin: "10px 0" },
      qno: { color: C.accent, marginRight: 4 },
      choices: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "1px 24px",
        marginTop: 4, fontSize: 14.5 },
      passage: { background: "#faf8ef", border: "1px solid " + C.line,
        padding: "10px 13px", margin: "6px 0", fontSize: 14.5, lineHeight: 1.9 },
      answerLine: { marginTop: 4, color: "#555", letterSpacing: 1 },
      keyBox: { marginTop: 26, borderTop: "2.5px double " + C.ink, paddingTop: 12 },
      keyTitle: { fontWeight: 700, letterSpacing: 1, marginBottom: 8 },
      keyRow: { fontSize: 14, lineHeight: 1.9 },
    };
    const PRINT_CSS = "@media print {.no-print{display:none!important;} body{background:#fff;}}";

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
